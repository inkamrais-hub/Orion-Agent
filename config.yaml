# 猎户座 Agent 配置
# 所有 ${VAR} 会被替换为环境变量

provider:
  type: openai
  api_key: ${LLM_API_KEY}
  api_base: ${LLM_API_BASE}
  model: ${LLM_MODEL}
  thinking: disabled

cache:
  l1_max_entries: 2048
  l1_ttl_secs: 300
  l2_max_entries: 128

orchestrator:
  mode: sequential
  max_workers: 3
  max_rounds: 10

agent:
  max_turns: 50
  max_tool_calls: 30
  token_budget: 128000

audit:
  enabled: true
  path: ./audit.log
