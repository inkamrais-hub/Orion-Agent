// ==================== Page: Chat ====================
function ChatPage() {
  const [input, setInput] = useState("");
  const [streaming, setStreaming] = useState(false);
  const [streamText, setStreamText] = useState("");
  const chatRef = useRef(null);
  const fullText = "正在通过 Provider.stream() 流式调用 DeepSeek...\n\n已完成代码安全审查，发现 2 个潜在风险点：\n1. bash 工具执行命令时缺少完整的路径白名单校验\n2. write 工具对工作区外的路径检查存在 TOCTOU 竞态条件\n\n建议：增加 ExecPolicy 白名单覆盖，并在 workspace.rs 中引入文件锁。";

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [streamText]);

  const handleSend = () => {
    if (!input.trim()) return;
    setStreaming(true); setStreamText(""); setInput("");
    let i = 0;
    const iv = setInterval(() => {
      if (i < fullText.length) { setStreamText(fullText.slice(0, i+1)); i++; }
      else { clearInterval(iv); setStreaming(false); }
    }, 20);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 80px)", animation:"fadeIn 0.3s ease" }}>
      <SectionTitle icon={IconMsg} title="Agent 对话" subtitle="基于 run_simple_loop() 的流式对话 — 支持工具调用、上下文压缩、缓存命中" />
      <div ref={chatRef} style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:16, padding:"0 4px 16px 4px" }}>
        {chatMsgs.map((msg,i) => (
          <div key={i}>
            <div style={{ display:"flex", gap:12, flexDirection: msg.role==="user" ? "row-reverse" : "row" }}>
              <div style={{ width:32, height:32, borderRadius:8, flexShrink:0, backgroundColor: msg.role==="user" ? C.accent+"30" : C.primary+"30", display:"flex", alignItems:"center", justifyContent:"center" }}>
                {msg.role==="user" ? <IconUsers size={16} color={C.accent} /> : <IconBot size={16} color={C.primaryLight} />}
              </div>
              <div style={{ maxWidth:"75%", padding:"12px 16px", borderRadius:12, backgroundColor: msg.role==="user" ? C.primary+"15" : C.hover, border:`1px solid ${msg.role==="user" ? C.primary+"30" : C.border}` }}>
                {msg.thinking && (
                  <div style={{ marginBottom:10, padding:"8px 12px", borderRadius:8, backgroundColor:C.purple+"12", border:`1px solid ${C.purple}25`, fontSize:12, color:C.purple, fontStyle:"italic" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}><IconSparkle size={12} color={C.purple} /><span style={{ fontWeight:600 }}>Thinking</span></div>
                    {msg.thinking}
                  </div>
                )}
                <div style={{ fontSize:13, color:C.text, lineHeight:1.6, whiteSpace:"pre-wrap" }}>{msg.content}</div>
                {msg.tools && (
                  <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:6 }}>
                    {msg.tools.map((tool,j) => (
                      <div key={j} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:8, backgroundColor:C.bg, border:`1px solid ${C.border}`, fontSize:12 }}>
                        <IconWrench size={12} color={C.cyan} />
                        <span style={{ fontWeight:600, color:C.cyan }}>{tool.name}</span>
                        <span style={{ color:C.textMuted, fontFamily:"monospace", fontSize:11 }}>{tool.input}</span>
                        <span style={{ marginLeft:"auto" }}>
                          {tool.status==="done"
                            ? <Badge color={C.green}><IconCheck size={10} color={C.green} /> {tool.result}</Badge>
                            : <Badge color={C.accent}><IconRefresh size={10} color={C.accent} /> 执行中...</Badge>}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        ))}
        {streaming && (
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ width:32, height:32, borderRadius:8, flexShrink:0, backgroundColor:C.primary+"30", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <IconBot size={16} color={C.primaryLight} />

            <div style={{ maxWidth:"75%", padding:"12px 16px", borderRadius:12, backgroundColor:C.hover, border:`1px solid ${C.border}`, fontSize:13, color:C.text, lineHeight:1.6, whiteSpace:"pre-wrap" }}>

            </div>
          </div>
        )}
      </div>
      <div style={{ display:"flex", gap:10, padding:"12px 0 0 0", borderTop:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", gap:6, alignItems:"center", padding:"0 12px", borderRadius:8, backgroundColor:C.hover, border:`1px solid ${C.border}` }}>
          <IconBot size={14} color={C.primaryLight} /><span style={{ fontSize:12, color:C.textSec }}>deepseek-chat</span>
        </div>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend()}
